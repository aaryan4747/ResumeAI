<!DOCTYPE html>
<html>
<head>
    <title>All Resumes - Resume AI</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px gray;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: blue;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .back-btn {
            margin-bottom: 15px;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            background: darkgreen;
        }

    </style>

</head>

<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<h2>Uploaded Resumes</h2>

<table id="resumeTable">

    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Experience</th>
        <th>Location</th>
        <th>AI Score</th>
    </tr>
    </thead>

    <tbody></tbody>

</table>


<script>

    function goBack() {
        window.location.href = "index.html";
    }


    async function loadResumes() {

        let response = await fetch("http://localhost:8081/api/resume/all");

        let resumes = await response.json();

        let table = document.querySelector("#resumeTable tbody");

        table.innerHTML = "";

        resumes.forEach(resume => {

            let row = `
            <tr>
                <td>${resume.id}</td>
                <td>${resume.name}</td>
                <td>${resume.email}</td>
                <td>${resume.experience}</td>
                <td>${resume.location}</td>
                <td>${resume.aiScore}</td>
            </tr>
        `;

            table.innerHTML += row;

        });

    }

    loadResumes();

</script>


</body>
</html>
